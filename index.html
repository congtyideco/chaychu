<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản Trị Tin Chạy - IDECO</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;800&display=swap" rel="stylesheet">
<style>
    /* CSS đồng bộ giao diện hiện đại */
    :root { --bg: #0a0e1a; --surface: #111827; --accent: #00d4ff; --text: #e2e8f0; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
    .card { background: var(--surface); border: 1px solid #1e2d45; border-radius: 16px; padding: 30px; max-width: 800px; margin: auto; }
    textarea { width: 100%; height: 250px; background: #1a2235; border: 1px solid #1e2d45; color: white; padding: 15px; border-radius: 10px; font-size: 16px; outline: none; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; gap: 5px; font-size: 12px; }
    input, select { background: #1a2235; border: 1px solid #1e2d45; color: white; padding: 10px; border-radius: 8px; }
    .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .btn-run { background: #00e676; color: #000; }
    .btn-stop { background: #334155; color: #fff; }
</style>
</head>
<body>
<div class="card">
    <h2 style="color:var(--accent); margin-bottom:20px;">📡 ĐIỀU KHIỂN TIN CHẠY</h2>
    <textarea id="msgInput" placeholder="Dán đoạn văn bản dài tại đây..."></textarea>
    <div class="grid">
        <div class="field"><label>Màu chữ</label><input type="color" id="tColor" value="#ffffff"></div>
        <div class="field"><label>Cỡ chữ (px)</label><input type="number" id="fSize" value="24"></div>
        <div class="field"><label>Tốc độ (hệ số)</label><input type="number" id="tSpeed" value="25"></div>
        <div class="field"><label>Định dạng</label><select id="fWeight"><option value="400">Thường</option><option value="700" selected>Đậm</option></select></div>
        <div class="field"><label>Cách đáy (px)</label><input type="number" id="bOffset" value="38"></div>
    </div>
    <button class="btn btn-run" onclick="save(true)">🚀 LƯU VÀ CHẠY CHỮ</button>
    <button class="btn btn-stop" onclick="save(false)">⏹ DỪNG PHÁT</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const config = {
        apiKey: "AIzaSyC5-yB_TwgaxqjO7VXFQ6L22FyLRyDZ878",
        databaseURL: "https://bevy-3c9da-default-rtdb.firebaseio.com",
    };

    const app = initializeApp(config);
    const db = getDatabase(app);

    window.save = (run) => {
        const text = document.getElementById('msgInput').value.trim();
        set(ref(db, 'IDECO_FINAL_SYNC'), {
            text: text.replace(/\n/g, " "),
            color: document.getElementById('tColor').value,
            size: document.getElementById('fSize').value,
            speed: document.getElementById('tSpeed').value,
            weight: document.getElementById('fWeight').value,
            bottom: document.getElementById('bOffset').value,
            active: run,
            ts: Date.now()
        }).then(() => alert(run ? "Đang phát!" : "Đã dừng!"));
    };
</script>
</body>
</html>
