<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị Tin Chạy IDECO - Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0e1a; --surface: #111827; --accent: #00d4ff; --text: #e2e8f0; --border: #1e2d45; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--surface); padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { color: var(--accent); margin-bottom: 20px; font-size: 20px; display: flex; align-items: center; gap: 10px; }
        textarea { width: 100%; height: 220px; background: #0f172a; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 10px; font-size: 16px; outline: none; resize: vertical; margin-bottom: 20px; }
        .settings { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .field { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: #64748b; }
        input, select { background: #1a2235; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        .btn-run { background: #00e676; color: #000; }
        .btn-stop { background: #334155; color: #fff; }
        .status { margin-top: 15px; text-align: center; font-size: 13px; color: #64748b; }
    </style>
</head>
<body>
<div class="container">
    <h2>📡 ĐIỀU KHIỂN TIN CHẠY (MASTER)</h2>
    <textarea id="msgInput" placeholder="Nhập văn bản dài tại đây..."></textarea>
    <div class="settings">
        <div class="field"><label>Màu chữ</label><input type="color" id="color" value="#ffffff"></div>
        <div class="field"><label>Cỡ chữ (px)</label><input type="number" id="size" value="24"></div>
        <div class="field"><label>Tốc độ (30=Vừa)</label><input type="number" id="speed" value="30"></div>
        <div class="field"><label>Cách đáy (px)</label><input type="number" id="bottom" value="38"></div>
    </div>
    <div class="btn-group">
        <button class="btn btn-run" onclick="send(true)">🚀 LƯU & PHÁT NGAY</button>
        <button class="btn btn-stop" onclick="send(false)">⏹ DỪNG</button>
    </div>
    <div id="status" class="status">Sẵn sàng...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC5-yB_TwgaxqjO7VXFQ6L22FyLRyDZ878",
        databaseURL: "https://bevy-3c9da-default-rtdb.firebaseio.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.send = (isActive) => {
        const text = document.getElementById('msgInput').value.trim();
        if(isActive && !text) return alert("Vui lòng nhập văn bản!");
        
        set(ref(db, 'IDECO_TICKER_MASTER'), {
            content: text.replace(/\n/g, " "), // Ép thành 1 hàng
            color: document.getElementById('color').value,
            size: document.getElementById('size').value,
            speed: document.getElementById('speed').value,
            bottom: document.getElementById('bottom').value,
            active: isActive,
            trigger: Date.now() // Buộc script khách phải cập nhật ngay
        }).then(() => {
            document.getElementById('status').innerText = isActive ? "✅ Đã phát!" : "⏹ Đã dừng.";
        });
    };
</script>
</body>
</html>
