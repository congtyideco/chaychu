<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Trị Tin Chạy - IDECO</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    /* Giữ nguyên toàn bộ CSS đẹp của bạn */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --border: #1e2d45; --accent: #00d4ff; --accent2: #ff6b35; --success: #00e676; --danger: #ff3d71; --text: #e2e8f0; --muted: #64748b; --glow: 0 0 20px rgba(0,212,255,0.3); }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .header { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .header-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), #0077ff); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: var(--glow); flex-shrink: 0; }
    .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .status-badge { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--muted); padding: 6px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.running { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
    .card-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    textarea { width: 100%; min-height: 100px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; font-family: 'Be Vietnam Pro', sans-serif; font-size: 15px; color: var(--text); resize: vertical; outline: none; transition: all 0.2s; line-height: 1.6; }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
    .controls { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .settings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 4px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--muted); }
    .field input, .field select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--text); font-size: 14px; outline: none; width: 100%; }
    .field input[type="color"] { height: 42px; padding: 4px; cursor: pointer; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 20px; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #0077ff); color: #000; }
    .btn-run { background: linear-gradient(135deg, var(--success), #00b248); color: #000; }
    .btn-stop { background: var(--accent2); color: #fff; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(255,61,113,0.3); }
    .msg-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .active-item { border-color: var(--accent); background: rgba(0,212,255,0.05); }
    .preview-box { background: #000; border-radius: 8px; overflow: hidden; height: 50px; position: relative; border: 1px solid var(--border); display: flex; align-items: center; }
    .preview-ticker { white-space: nowrap; position: absolute; animation: previewMove 10s linear infinite; }
    @keyframes previewMove { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; z-index: 9999; opacity: 0; transform: translateY(20px); transition: 0.3s; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .success { background: var(--success); color: #000; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-icon">📡</div>
        <div><h1>Quản Trị Tin Chạy</h1><p>Hệ thống phát sóng văn bản trực tiếp - IDECO</p></div>
        <div class="status-badge"><div class="status-dot" id="statusDot"></div><span id="statusText">Đang kết nối...</span></div>
    </div>

    <div class="card">
        <div class="card-label">✏️ Soạn tin mới</div>
        <textarea id="msgInput" placeholder="Nhập nội dung văn bản..." maxlength="500"></textarea>
        <div class="controls">
            <button class="btn btn-primary" onclick="saveMessage()">💾 Lưu tin</button>
            <button class="btn btn-run" id="runBtn" onclick="runCurrent()">▶ Chạy ngay</button>
            <button class="btn btn-stop" onclick="stopTicker()">⏹ Dừng</button>
        </div>
    </div>

    <div class="card">
        <div class="card-label">⚙️ Cài đặt hiển thị</div>
        <div class="settings-grid">
            <div class="field"><label>Tốc độ (giây/vòng)</label><input type="number" id="speed" value="25" min="5"></div>
            <div class="field"><label>Cỡ chữ (px)</label><input type="number" id="fontSize" value="18"></div>
            <div class="field"><label>Màu chữ</label><input type="color" id="textColor" value="#ffffff"></div>
            <div class="field"><label>Kiểu chữ</label><select id="fontWeight"><option value="400">Thường</option><option value="700" selected>Đậm</option><option value="900">Siêu đậm</option></select></div>
            <div class="field"><label>Khoảng cách đáy (px)</label><input type="number" id="bottomOffset" value="38"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:15px" onclick="saveSettings()">💾 Lưu cài đặt</button>
    </div>

    <div class="card">
        <div class="card-label">📋 Tin đã lưu</div>
        <div id="savedList"></div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC5-yB_TwgaxqjO7VXFQ6L22FyLRyDZ878",
        databaseURL: "https://bevy-3c9da-default-rtdb.firebaseio.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tickerRef = ref(db, 'ticker/active');
    const settingsRef = ref(db, 'ticker/settings');
    const messagesRef = ref(db, 'ticker/messages');

    // Đồng bộ cài đặt
    onValue(settingsRef, (s) => {
        const val = s.val();
        if(val) {
            document.getElementById('speed').value = val.speed || 25;
            document.getElementById('fontSize').value = val.fontSize || 18;
            document.getElementById('textColor').value = val.textColor || '#ffffff';
            document.getElementById('fontWeight').value = val.fontWeight || '700';
            document.getElementById('bottomOffset').value = val.bottomOffset || 38;
        }
    });

    // Hiển thị danh sách tin
    onValue(messagesRef, (s) => {
        const list = document.getElementById('savedList');
        const data = s.val();
        list.innerHTML = '';
        if(data) {
            Object.keys(data).forEach(id => {
                const item = document.createElement('div');
                item.className = 'msg-item';
                item.innerHTML = `<span>${data[id].text}</span><div>
                    <button class="btn btn-run" onclick="runMsg('${id}')">▶</button>
                    <button class="btn btn-danger" onclick="delMsg('${id}')">🗑</button>
                </div>`;
                list.appendChild(item);
            });
        }
    });

    window.saveSettings = () => {
        set(settingsRef, {
            speed: +document.getElementById('speed').value,
            fontSize: +document.getElementById('fontSize').value,
            textColor: document.getElementById('textColor').value,
            fontWeight: document.getElementById('fontWeight').value,
            bottomOffset: +document.getElementById('bottomOffset').value
        });
        showToast("Đã lưu cấu hình!");
    };

    window.runCurrent = () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        set(tickerRef, { text, running: true, timestamp: Date.now() });
        saveSettings();
    };

    window.saveMessage = () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        push(messagesRef, { text, createdAt: Date.now() });
        document.getElementById('msgInput').value = '';
    };

    window.runMsg = (id) => {
        onValue(ref(db, `ticker/messages/${id}`), (s) => {
            const data = s.val();
            if(data) set(tickerRef, { text: data.text, running: true, timestamp: Date.now() });
        }, {onlyOnce: true});
    };

    window.stopTicker = () => set(tickerRef, { running: false });

    window.delMsg = (id) => remove(ref(db, `ticker/messages/${id}`));

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.className = 'toast show success';
        setTimeout(() => t.className = 'toast', 3000);
    }
</script>
</body>
</html>
