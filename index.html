<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị Tin Chạy Cao Cấp - IDECO</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0e1a; --surface: #111827; --accent: #00d4ff; --text: #e2e8f0; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); padding: 30px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--surface); border: 1px solid #1e2d45; border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 20px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        
        /* Soạn thảo văn bản dài */
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        textarea { 
            width: 100%; height: 250px; background: #0f172a; border: 1px solid #1e2d45; 
            color: #fff; padding: 15px; border-radius: 10px; font-size: 16px; line-height: 1.6;
            resize: vertical; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,255,0.2); }

        /* Cài đặt */
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        input, select { background: #1a2235; border: 1px solid #1e2d45; color: white; padding: 12px; border-radius: 8px; outline: none; }
        input[type="color"] { height: 45px; padding: 5px; cursor: pointer; }

        /* Nút bấm */
        .btn-group { display: flex; gap: 15px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 15px; }
        .btn-run { background: linear-gradient(135deg, #00e676, #00c853); color: #000; }
        .btn-stop { background: #334155; color: white; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .status-bar { margin-top: 20px; padding: 10px; border-radius: 8px; background: rgba(0,212,255,0.1); font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1><span>📡</span> Hệ Thống Điều Khiển Tin Chạy</h1>
            
            <div class="input-group">
                <label>Nội dung văn bản (Hỗ trợ đoạn văn cực dài)</label>
                <textarea id="msgInput" placeholder="Nhập hoặc dán đoạn văn bản dài tại đây..."></textarea>
            </div>

            <div class="settings-grid">
                <div class="field"><label>Màu chữ</label><input type="color" id="textColor" value="#ffffff"></div>
                <div class="field"><label>Cỡ chữ (px)</label><input type="number" id="fontSize" value="22"></div>
                <div class="field">
                    <label>Tốc độ chạy</label>
                    <select id="speed">
                        <option value="40">Rất chậm</option>
                        <option value="25" selected>Bình thường</option>
                        <option value="15">Nhanh</option>
                        <option value="8">Rất nhanh</option>
                    </select>
                </div>
                <div class="field">
                    <label>Định dạng</label>
                    <select id="fontWeight">
                        <option value="400">Chữ thường</option>
                        <option value="700" selected>Chữ đậm</option>
                        <option value="900">Siêu đậm</option>
                    </select>
                </div>
                <div class="field"><label>Cách đáy (px)</label><input type="number" id="bottom" value="38"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-run" onclick="sendData(true)">🚀 LƯU & PHÁT TIN</button>
                <button class="btn btn-stop" onclick="sendData(false)">⏹ DỪNG CHẠY</button>
            </div>

            <div id="status" class="status-bar">Trạng thái: Sẵn sàng kết nối</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5-yB_TwgaxqjO7VXFQ6L22FyLRyDZ878",
            databaseURL: "https://bevy-3c9da-default-rtdb.firebaseio.com",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, 'ticker_system_v2');

        window.sendData = (isRunning) => {
            const content = document.getElementById('msgInput').value.trim();
            if(isRunning && !content) return alert("Vui lòng nhập nội dung!");

            const config = {
                text: content.replace(/\n/g, " "), // Loại bỏ xuống dòng để ép thành 1 hàng
                textColor: document.getElementById('textColor').value,
                fontSize: document.getElementById('fontSize').value,
                speedMultiplier: document.getElementById('speed').value,
                fontWeight: document.getElementById('fontWeight').value,
                bottom: document.getElementById('bottom').value,
                running: isRunning,
                timestamp: Date.now()
            };
            
            set(dataRef, config).then(() => {
                document.getElementById('status').innerText = isRunning ? "✅ Đang phát sóng văn bản..." : "⏹ Đã dừng phát.";
            });
        };

        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('msgInput').value = data.text || "";
                document.getElementById('textColor').value = data.textColor;
                document.getElementById('fontSize').value = data.fontSize;
                document.getElementById('bottom').value = data.bottom;
                document.getElementById('status').innerText = data.running ? "🟢 Đang có tin chạy trên hệ thống" : "⚪ Hệ thống đang trống";
            }
        });
    </script>
</body>
</html>
